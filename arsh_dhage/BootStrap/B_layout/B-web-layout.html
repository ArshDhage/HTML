<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Layout</title>
</head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
    .bg-red{
        background-color: red;
    }
    .bg-green{
        background-color: green;
    }
    .bg-light-blue{
        background-color: lightblue;
    }
    .bg-yellow{
        background-color: yellow;
    }
    .header-height{
        height: 80px;
    }
    .c-height{
        height: 500px;
    }
</style>
<body>
    <div class="row">
        <div class="col-md-3 bg-red">Home</div>
        <div class="col-md-3 bg-yellow">About</div>
        <div class="col-md-3 bg-light-blue">Project</div>
        <div class="col-md-3 bg-green">Contact</div>

        <div class="col-12 c-height" style="background-color: aqua;"></div>
        <div class="col-12 c-height" style="background-color: rgb(32, 143, 143);"></div>
        <div class="col-12 c-height" style="background-color: rgb(24, 122, 122);"></div>
        <div class="col-12 c-height" style="background-color: rgb(8, 78, 78);"></div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

</html>
