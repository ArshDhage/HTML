<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Media Page</title>

    <!-- Bootstrap CSS Link -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Bootstrap JS Link -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container-fluid vh-100 d-flex flex-column">
      <!-- Header Start -->
      <div
        class="d-flex justify-content-between align-items-center p-2 bg-primary text-white"
      >
        <h5>My Chat</h5>
        <div class="d-flex gap-10">
          <!-- Search Icon SVG -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-search"
            viewBox="0 0 16 16"
          >
            <path
              d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"
            />
          </svg>

          <!-- Menu Icon SVG -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-three-dots-vertical"
            viewBox="0 0 16 16"
          >
            <path
              d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"
            />
          </svg>
        </div>
      </div>
      <!-- Header End -->

      <!-- Tabs Start -->
      <ul class="nav nav-tabs bg-light">
        <li class="nav-item">
          <a class="nav-link active fw-bold" href="">Chats</a>
        </li>
        <li class="nav-item"><a class="nav-link" href="">Groups</a></li>
        <li class="nav-item"><a class="nav-link" href="">Status</a></li>
        <li class="nav-item"><a class="nav-link" href="">Calls</a></li>
      </ul>
      <!-- Tabs End -->

      <div class="row flex-grow-1 overfloe-hidden">
        <!-- Chat List -->
        <div class="col-4 border">
          <!-- Search bar -->
          <div class="p-2">
            <input
              type="text"
              class="form-control"
              placeholder="Search Chats"
            />
          </div>

          <!-- Users -->
          <div class="list-group list-group-flush">
            <!-- User 1 Start -->
            <a
              href="#"
              class="list-group-item list-group-item-action d-flex justify-content-between align-items-start"
            >
              <div class="d-flex">
                <img
                  src="https://images.rawpixel.com/image_png_800/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDI0LTEyL3Jhd3BpeGVsb2ZmaWNlMTBfYWR1bHRfaW5kaWFuX2xhdWdoaW5nX2FuZF9oYXZpbmdfZnVuX2luZGlhbl9idV8yNTNkNzMyYy03M2FiLTRlMDEtYTkwYy0zYjE1MGE2OTEzNWVfMS5wbmc.png"
                  class="rounded-circle"
                  alt=""
                  height="50px"
                  width="50px"
                />
                <div>
                  <div>User 1</div>
                  <small>Last message...</small>
                </div>
              </div>
              <small>10:30 AM</small>
            </a>
            <!-- User 1 End -->

            <!-- User 2 Start -->
            <a
              href="#"
              class="list-group-item list-group-item-action d-flex justify-content-between align-items-start"
            >
              <div class="d-flex">
                <img
                  src="https://images.rawpixel.com/image_png_800/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDI0LTA5L3Jhd3BpeGVsX29mZmljZV8zMF9waG90b19vZl9tYW5faW5kaWFuX2FybXNfY3Jvc3NlZF9zZWxmLWNvbmZpZF8wMDgwMDBlNS00YjdiLTQ1N2UtYjA3Mi02NGMwOGIwMWQ2ZmEucG5n.png"
                  class="rounded-circle"
                  alt=""
                  height="50px"
                  width="50px"
                />
                <div>
                  <div>User 2</div>
                  <small>Last message...</small>
                </div>
              </div>
              <small>10:30 AM</small>
            </a>
            <!-- User 2 End -->

            <!-- User 3 Start -->
            <a
              href="#"
              class="list-group-item list-group-item-action d-flex justify-content-between align-items-start"
            >
              <div class="d-flex">
                <img
                  src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRb2DFkEQQFyU0vPOZoUP4mMyMGEjYycTfb3A&s"
                  class="rounded-circle"
                  alt=""
                  height="50px"
                  width="50px"
                />
                <div>
                  <div>User 3</div>
                  <small>Last message...</small>
                </div>
              </div>
              <small>10:30 AM</small>
            </a>
            <!-- User 3 End -->
          </div>
        </div>

        <!-- Chat Window -->
        <div class="col-8 d-flex flex-column">
          <!-- Chat Header Start -->
          <div
            class="d-flex justify-content-between align-items-center p-2 border-bottom"
          >
            <div class="d-flex align-items-center">
              <img
                src="https://images.rawpixel.com/image_png_800/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDI0LTEyL3Jhd3BpeGVsb2ZmaWNlMTBfYWR1bHRfaW5kaWFuX2xhdWdoaW5nX2FuZF9oYXZpbmdfZnVuX2luZGlhbl9idV8yNTNkNzMyYy03M2FiLTRlMDEtYTkwYy0zYjE1MGE2OTEzNWVfMS5wbmc.png"
                alt=""
                class="rounded-circle me-2"
                height="50px"
                width="50px"
              />
              <div>
                <div>User 1</div>
                <small>Online</small>
              </div>
            </div>

            <div class="mt-3 d-flex gap-3">
              <!-- Camera Icon -->
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="currentColor"
                class="bi bi-camera-video-fill"
                viewBox="0 0 16 16"
              >
                <path
                  fill-rule="evenodd"
                  d="M0 5a2 2 0 0 1 2-2h7.5a2 2 0 0 1 1.983 1.738l3.11-1.382A1 1 0 0 1 16 4.269v7.462a1 1 0 0 1-1.406.913l-3.111-1.382A2 2 0 0 1 9.5 13H2a2 2 0 0 1-2-2z"
                />
              </svg>
            </div>

            <!-- phone icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-telephone-fill"
              viewBox="0 0 16 16"
            >
              <path
                fill-rule="evenodd"
                d="M1.885.511a1.745 1.745 0 0 1 2.61.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.68.68 0 0 0 .178.643l2.457 2.457a.68.68 0 0 0 .644.178l2.189-.547a1.75 1.75 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.6 18.6 0 0 1-7.01-4.42 18.6 18.6 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877z"
              />
            </svg>
          </div>
          <!-- Chat Header End -->

          <!-- Messages Start -->
           <div class="flex-grow-1 p-3 aver-flow-auto">
            <!-- Incoming -->
             <div class="d-flex mb-2">
                <div class="bg-light p-2 rounded-circle">
                    Hello!
                </div>
             </div>
             <!-- Outgoing -->
              <div class="d-flex justify-content-end mb-2">
                <div class="bg-primary text-white p-2 rounded">
                    Hi, Kaise ho aap?
                </div>
             </div>
           </div>
           <!-- Messages End -->
        </div>
      </div>
    </div>
  </body>
</html>
