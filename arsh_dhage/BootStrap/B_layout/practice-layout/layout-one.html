<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Practice Layout</title>
  </head>
  <style>
    body {
      height: 100%;
      width: 100%;
      background-color: #FDCFFA;
    }
    .main-container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .main-box {
      height: 550px;
      width: 100%;
      display: flex;
      flex-direction: row;
    }
    .box-one {
      height: 100%;
      width: 25%;
      border-radius: 20px;
      margin-left: 9%;
      background-color: white;
    }
    img {
      height: 300px;
      width: 300px;
    }
    button {
      background-color: black;
      color: white;
      width: 90%;
      height: 8%;
      border-radius: 20px;
    }
    .bg-green {
      color: Green;
      margin-right: 75%;
    }
    .box-two {
      height: 100%;
      width: 25%;
      border-radius: 20px;
      background-color: white;
      margin-left: 3%;
    }
    .box-three {
      height: 100%;
      width: 25%;
      border-radius: 20px;
      background-color: white;
      margin-left: 3%;
    }
    .top-two{
       border: 0.5px solid black;
    }
  </style>
  <body>
    <div class="main-container">
      <h1>🔥 Trending Sneakers Collection</h1>
      <p>Discover the latest styles with comfort and performance</p>
      <div class="main-box">
        <div class="box-one">
          <button class="top-button" style="width: 20%;">Best Seller</button>
          <button class="top-two" style="border-radius: 100%; width: 40px;">❤️</button>
          <img
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSN33R9N3WutUs3FLoGwvZ6pkBFSDdAVkiARQ&s"
            alt="Nike White and Orange"
          />
          <p style="margin-right: 80%">Nike</p>
          <h4 style="width: 50%">Dunk High Green Satin</h4>
          <h4 class="bg-green">$ 180.00</h4>
          <button>Buy Now</button>
        </div>
        <div class="box-two">
          <img
            src="https://png.pngtree.com/png-vector/20241018/ourmid/pngtree-running-shoes-or-sneakers-on-a-transparent-background-png-image_14112954.png"
            alt="Nike Sky Blue"
          />
          <p style="margin-right: 80%">Nike</p>
          <h4 style="width: 50%">Dunk High Green Satin</h4>
          <h4 class="bg-green">$ 69.99</h4>
          <button>Add to Cart</button>
        </div>
        <div class="box-three">
          <img
            src="https://png.pngtree.com/png-vector/20240520/ourmid/pngtree-women-s-shoes-sneakers-trainers-in-white-and-orange-png-image_12494915.png"
            alt="Nike Red"
          />
          <p style="margin-right: 80%">Nike</p>
          <h4 style="width: 50%">Dunk High Green Satin</h4>
          <h4 class="bg-green">$ 120.00</h4>
          <button>Add to Cart</button>
        </div>
      </div>
    </div>
  </body>
</html>
